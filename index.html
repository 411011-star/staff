<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待辦事項</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <h1>📝 待辦事項清單</h1>
        
        <div class="todo-input-section">
            <input type="text" id="todo-input" placeholder="新增一件想做的事吧...">
            <button id="add-btn">新增</button>
        </div>

        <div class="import-section">
            <input type="text" id="import-input" placeholder="輸入 Google 試算表 ID、網址或 Apps Script URL">
            <button id="import-btn">匯入試算表</button>
        </div>

        <ul id="todo-list">
            <!-- 待辦事項會透過 JavaScript 動態生成到這裡 -->
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
